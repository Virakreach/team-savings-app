<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Savings - CHHOR</title>
    <style>
        :root { --primary: #0066ff; --bg: #f2f4f7; --card: #ffffff; --text: #1a1a1a; --gray: #8e8e93; }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background-color: var(--bg); display: flex; justify-content: center; }
        .app-shell { width: 100%; max-width: 450px; min-height: 100vh; background: var(--card); display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        header { background: var(--primary); color: white; padding: 30px 20px; border-radius: 0 0 25px 25px; text-align: center; }
        .container { padding: 20px; flex-grow: 1; }
        .auth-card { display: flex; flex-direction: column; gap: 12px; margin-top: 40px; }
        input { padding: 16px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; outline: none; }
        .hidden { display: none !important; }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #f8f9fa; padding: 15px; border-radius: 15px; text-align: center; }
        .calendar-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 25px; }
        .day { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; background: #f0f0f0; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .day.selected { background: var(--primary); color: white; transform: scale(0.9); }
        .payment-box { text-align: center; padding: 20px; border: 2px dashed var(--primary); border-radius: 20px; background: #f0f7ff; }
        .qr-img { width: 200px; margin: 15px 0; border-radius: 15px; border: 4px solid white; }
        .btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-secondary { background: #eee; color: #333; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <header>
        <h2 style="margin:0;">Team Savings</h2>
        <p id="user-display">Connecting to Firebase...</p>
    </header>

    <div class="container">
        <div id="auth-view" class="auth-card">
            <h3 style="text-align:center;">Member Sign In</h3>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            <button class="btn" onclick="handleAuth('in')">Sign In</button>
            <button class="btn btn-secondary" onclick="handleAuth('up')">Create Account</button>
        </div>

        <div id="dashboard-view" class="hidden">
            <div class="stats-row">
                <div class="stat-card"><span>Days</span><br><b id="count">0</b></div>
                <div class="stat-card"><span>Total</span><br><b id="total">0</b>៛</div>
            </div>
            <div class="calendar-grid" id="calendar"></div>
            <div class="payment-box">
                <p>Scan ABA to Pay</p>
                <img src="https://via.placeholder.com/200x200?text=ABA+KHQR" class="qr-img">
                <button class="btn" onclick="submitPayment()">Confirm I Paid</button>
            </div>
            <button class="btn btn-secondary" onclick="signOutUser()" style="margin-top: 30px;">Log Out</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // FIXED CONFIG FROM YOUR SCREENSHOT
    const firebaseConfig = {
        apiKey: "AIzaSyDhkBEuYi3iz4OBclqRIsRrfuij8CATBK4",
        authDomain: "saving-95739.firebaseapp.com",
        projectId: "saving-95739",
        storageBucket: "saving-95739.firebasestorage.app",
        messagingSenderId: "628968611666",
        appId: "1:628968611666:web:fd97c817716d59a574a48b",
        measurementId: "G-ZM7MKHGVXN"
    };

    try {
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // UI Functions
        window.handleAuth = (type) => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if (type === 'up') {
                createUserWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
            } else {
                signInWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
            }
        };

        window.signOutUser = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-view').classList.add('hidden');
                document.getElementById('dashboard-view').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email;
                renderCalendar();
            } else {
                document.getElementById('auth-view').classList.remove('hidden');
                document.getElementById('dashboard-view').classList.add('hidden');
                document.getElementById('user-display').innerText = "Please Sign In";
            }
        });

        function renderCalendar() {
            const cal = document.getElementById('calendar');
            cal.innerHTML = "";
            for (let i = 1; i <= 30; i++) {
                const d = document.createElement('div');
                d.className = 'day'; d.innerText = i;
                d.onclick = () => { d.classList.toggle('selected'); updateTotals(); };
                cal.appendChild(d);
            }
        }

        function updateTotals() {
            const s = document.querySelectorAll('.selected').length;
            document.getElementById('count').innerText = s;
            document.getElementById('total').innerText = (s * 1000).toLocaleString();
        }

        window.submitPayment = async () => {
            const s = document.querySelectorAll('.selected').length;
            if (s === 0) return alert("Select days first!");
            await addDoc(collection(db, "payments"), {
                user: auth.currentUser.email,
                amount: s * 1000,
                status: "pending",
                date: serverTimestamp()
            });
            alert("Payment Saved!");
        };
    } catch (err) {
        document.getElementById('user-display').innerText = "Config Error!";
        console.error(err);
    }
</script>
</body>
</html>
